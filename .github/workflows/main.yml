name: Build Executables

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Build
        run: |
          uv run --with pyinstaller pyinstaller --onefile \
            --name nanoloop-linux \
            --hidden-import openai \
            --hidden-import ddgs \
            --hidden-import rich \
            --hidden-import requests \
            main.py
      - uses: actions/upload-artifact@v4
        with:
          name: nanoloop-linux
          path: dist/nanoloop-linux

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Build
        run: |
          uv run --with pyinstaller pyinstaller --onefile `
            --name nanoloop-windows `
            --hidden-import openai `
            --hidden-import ddgs `
            --hidden-import rich `
            --hidden-import requests `
            main.py
      - uses: actions/upload-artifact@v4
        with:
          name: nanoloop-windows
          path: dist/nanoloop-windows.exe

  build-macos:
    name: Build on macOS (Apple Silicon arm64)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Build
        run: |
          uv run --with pyinstaller pyinstaller --onefile \
            --name nanoloop-macos \
            --hidden-import openai \
            --hidden-import ddgs \
            --hidden-import rich \
            --hidden-import requests \
            main.py
      - uses: actions/upload-artifact@v4
        with:
          name: nanoloop-macos
          path: dist/nanoloop-macos

  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            Automated build from commit ${{ github.sha }}

            Download the binary for your platform:
            - 🐧 **Linux x86_64**: `nanoloop-linux`
            - 🪟 **Windows x86_64**: `nanoloop-windows.exe`
            - 🍎 **macOS arm64** (Apple Silicon M1/M2/M3): `nanoloop-macos`

            > Requires `llama-server` (from llama.cpp) to be installed and on your PATH.
            > Uses model `unsloth/Qwen3.5-0.8B-GGUF:UD-Q4_K_XL`
          files: |
            dist/nanoloop-linux/nanoloop-linux
            dist/nanoloop-windows/nanoloop-windows.exe
            dist/nanoloop-macos/nanoloop-macos
          draft: false
          prerelease: false
